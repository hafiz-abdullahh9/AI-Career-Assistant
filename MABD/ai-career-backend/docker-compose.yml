version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: career_db
    restart: always
    environment:
      POSTGRES_USER: career_user
      POSTGRES_PASSWORD: career_password
      POSTGRES_DB: career_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: career_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://career_user:career_password@db:5432/career_assistant
    depends_on:
      - db

volumes:
  postgres_data:
