apiVersion: v1
kind: Secret
metadata:
  name: career-assistant-secrets
  namespace: career-assistant
  labels:
    app: career-assistant
type: Opaque
stringData:
  # Base64 encoded values should be substituted here in production
  OPENAI_API_KEY: "PLACEHOLDER_OPENAI_API_KEY"
  GEMINI_API_KEY: "PLACEHOLDER_GEMINI_API_KEY"
  DATABASE_PASSWORD: "PLACEHOLDER_DATABASE_PASSWORD"
  ENCRYPTION_KEY: "PLACEHOLDER_32_BYTE_BASE64_KEY"
