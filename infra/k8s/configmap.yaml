apiVersion: v1
kind: ConfigMap
metadata:
  name: career-assistant-config
  namespace: career-assistant
  labels:
    app: career-assistant
data:
  LOG_LEVEL: "INFO"
  LLM_PROVIDER: "gemini"
  REDIS_URL: "redis://redis-service.career-assistant.svc.cluster.local:6379/0"
  DATABASE_URL: "postgresql+asyncpg://postgres@postgres-service.career-assistant.svc.cluster.local:5432/career_assistant"
  RATE_LIMIT_DAILY: "50"
  PROFILE_CONTEXT_TTL_SECONDS: "86400"
