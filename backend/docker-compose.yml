# docker-compose.yml — Production / Staging configuration
#
# Key design decisions:
#   - No bind mounts: container code is ONLY what was baked into the image.
#     Use docker-compose.override.yml for local development with live reload.
#   - `migrate` runs once on startup (restart: "no"), then the api/worker
#     services wait for it to complete successfully before starting.
#   - All services depend on health-checked postgres and redis.
#   - Named volumes for persistent data; no anonymous volumes.
#   - PYTHONUNBUFFERED=1 on all services to ensure logs are flushed immediately
#     to Docker's log driver (critical for observability in production).

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16.3-alpine
    container_name: automation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-automation_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-automation_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: automation_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Database migration + RBAC seed (one-shot) ───────────────────────────────
  # Runs Alembic migrations then seeds fixed RBAC roles/permissions.
  # Both operations are idempotent — safe to re-run on every deploy.
  # api and worker wait for this service to complete successfully (exit 0)
  # before starting, eliminating the "migrations not run yet" race condition.
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: automation-api:latest
    container_name: automation_migrate
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-automation_db}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo '==> Running Alembic migrations...' &&
        alembic upgrade head &&
        echo '==> Seeding RBAC roles and permissions...' &&
        python scripts/seed_rbac.py &&
        echo '==> Verifying RBAC seed...' &&
        python scripts/verify_rbac.py &&
        echo '==> Migration and seed complete.'
      "

  # ── FastAPI Application Server ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: automation-api:latest
    container_name: automation_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-automation_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "${API_PORT:-8004}:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Worker (application task execution) ──────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    image: automation-worker:latest
    container_name: automation_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-automation_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      # Chrome headless settings (consumed by BaseIntegrationAdapter)
      CHROME_NO_SANDBOX: "1"
      CHROME_HEADLESS: "1"
      WDM_LOG_LEVEL: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      celery -A app.tasks.celery_app.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-4}
      --queues=high,normal,low
      --hostname=worker@%h
      --max-tasks-per-child=100
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app.celery_app", "inspect", "ping", "--timeout=5"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ── Celery Beat Scheduler ───────────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    image: automation-worker:latest
    container_name: automation_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-automation_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      celery -A app.tasks.celery_app.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
      --pidfile=/tmp/celerybeat.pid

  # ── Flower (Celery monitoring UI) ───────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    image: automation-worker:latest
    container_name: automation_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app.celery_app flower
      --port=5555
      --broker=redis://redis:6379/1
      --url-prefix=flower
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/flower/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
