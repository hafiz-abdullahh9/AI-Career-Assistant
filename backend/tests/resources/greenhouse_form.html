<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greenhouse Mock Job Application</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fafafa; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input[type="text"], .form-group input[type="email"] { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { background: #2f855a; color: white; border: none; padding: 10px 15px; cursor: pointer; width: 100%; }
        #success-container { display: none; background: #e6fffa; color: #234e52; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div id="form-container">
        <h2>Greenhouse Job Board Mock Form</h2>
        <form id="greenhouse-form" onsubmit="doSubmit(event)">
            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" required>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone">
            </div>
            <div class="form-group">
                <label for="resume">Resume</label>
                <input type="file" id="resume" required>
            </div>
            <div class="form-group">
                <label for="cover_letter">Cover Letter</label>
                <input type="file" id="cover_letter">
            </div>
            <button type="submit" id="submit_app" class="btn">Submit Application</button>
        </form>
    </div>
    <div id="success-container">
        <h3>Application submitted!</h3>
        <p>Thank you for applying. We have received your application.</p>
        <p>Confirmation number: <span id="confirmation-code">CONF-GH123456</span></p>
    </div>
</div>
<script>
    function doSubmit(e) {
        e.preventDefault();
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('success-container').style.display = 'block';
    }
</script>
</body>
</html>
