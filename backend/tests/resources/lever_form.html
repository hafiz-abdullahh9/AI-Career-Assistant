<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lever Mock Job Application</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fafafa; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input[type="text"], .form-group input[type="email"] { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { background: #1a202c; color: white; border: none; padding: 10px 15px; cursor: pointer; width: 100%; }
        #success-container { display: none; background: #ebf8ff; color: #2b6cb0; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div id="form-container">
        <h2>Lever Jobs Board Mock Form</h2>
        <form id="lever-form" onsubmit="doSubmit(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone">
            </div>
            <div class="form-group">
                <label>Resume</label>
                <input type="file" name="resume" required>
            </div>
            <button type="submit" class="btn">Submit Application</button>
        </form>
    </div>
    <div id="success-container">
        <h3>Application submitted!</h3>
        <p>Thank you for applying. We have received your application.</p>
        <p>Confirmation: <span id="confirmation-code">CONF-LEVER9988</span></p>
    </div>
</div>
<script>
    function doSubmit(e) {
        e.preventDefault();
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('success-container').style.display = 'block';
    }
</script>
</body>
</html>
